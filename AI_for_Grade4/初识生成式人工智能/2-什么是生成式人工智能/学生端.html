<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生端 - 灵感捕捉</title>
    <script src="https://lib.baomitu.com/vue/3.3.4/vue.global.prod.js"></script>
    <script src="https://lib.baomitu.com/convex/1.11.0/browser.bundle.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 2.5rem;
            border-radius: 2rem;
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        .word-btn {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.6rem 1.2rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #cbd5e1;
        }
        .word-btn:hover { border-color: #38bdf8; color: white; }
        .word-btn.active { 
            background: #0ea5e9; 
            color: white; 
            border-color: #7dd3fc;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
        }
        [v-cloak] { display: none; }
    </style>
</head>
<body>

    <div id="app" v-cloak>
        <div class="card">
            <div class="flex items-center justify-center gap-2 mb-8 text-xs text-slate-500 uppercase">
                <span class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e]"></span>
                云端同步中
            </div>

            <div class="mb-10">
                <p class="text-slate-400 mb-2 italic">请点击词语补全：</p>
                <h1 class="text-3xl md:text-4xl font-bold leading-tight">
                    雪花像 <br>
                    <span class="text-sky-400 border-b-4 border-sky-500 px-2 mt-2 inline-block">
                        {{ currentWord || '________' }}
                    </span>
                </h1>
            </div>

            <div class="flex flex-wrap justify-center gap-3 mb-10">
                <button 
                    v-for="word in wordPool" 
                    :key="word"
                    @click="currentWord = word"
                    :class="['word-btn', currentWord === word ? 'active' : '']"
                >
                    {{ word }}
                </button>
            </div>

            <button 
                @click="submit" 
                :disabled="!currentWord || loading"
                class="w-full py-4 bg-sky-600 hover:bg-sky-500 disabled:bg-slate-800 disabled:text-slate-600 rounded-xl font-bold text-lg transition-all active:scale-95"
            >
                {{ loading ? '发送中...' : '提交我的灵感' }}
            </button>
        </div>
    </div>

    <script>
        // 核心：等待所有库加载完毕
        window.onload = function() {
            if (typeof Vue === 'undefined' || typeof Convex === 'undefined') {
                document.body.innerHTML = `
                    <div style="color:white; text-align:center; padding:50px;">
                        <h2 style="color:#f87171">加载失败</h2>
                        <p>无法连接到基础库 (Vue 或 Convex)。</p>
                        <p>请尝试连接手机热点或检查网络防火墙。</p>
                    </div>`;
                return;
            }

            const { createApp, ref } = Vue;
            const CONVEX_URL = "https://sensible-sockeye-877.convex.cloud";

            createApp({
                setup() {
                    const currentWord = ref('');
                    const loading = ref(false);
                    const wordPool = ref(['羽毛', '棉絮', '精灵', '纸片', '花瓣', '梨花', '白砂糖', '降落伞', '盐粒', '鹅毛']);

                    // 初始化 Convex 客户端
                    let client = null;
                    try {
                        client = new Convex.ConvexClient(CONVEX_URL);
                    } catch (err) {
                        console.error("客户端初始化失败", err);
                    }

                    const submit = async () => {
                        if (!client) {
                            alert("后端连接不可用");
                            return;
                        }
                        loading.value = true;
                        try {
                            // 注意：这里的 mutation 名称必须和后端 convex/words.ts 里的 export 对应
                            await client.mutation("words:send", { 
                                word: currentWord.value, 
                                time: new Date().toLocaleTimeString('zh-CN', { hour12: false })
                            });
                            alert('✅ 发送成功！');
                            currentWord.value = ''; 
                        } catch (e) {
                            console.error(e);
                            alert('❌ 发送失败！请确认电脑端已运行 npx convex dev');
                        } finally {
                            loading.value = false;
                        }
                    };

                    return { currentWord, wordPool, submit, loading };
                }
            }).mount('#app');
        };
    </script>
</body>
</html>
