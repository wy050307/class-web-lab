<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>建立模型</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 20px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 850px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            margin-top: 20px;
        }
        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 30px;
            color: #2c3e50;
            font-size: 28px;
        }

        /* ----- 视图1：输入区域 ----- */
        #view-input {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 280px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
            font-family: monospace;
        }
        textarea:focus {
            border-color: #3498db;
        }
        .btn-clear {
            position: absolute;
            right: 12px;
            bottom: 12px;
            background: #fff;
            border: 1px dashed #999;
            color: #666;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-clear:hover {
            border-color: #e74c3c;
            color: #e74c3c;
        }
        .btn-build {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }
        .btn-build:hover {
            background: #2980b9;
        }
        .btn-build:active {
            transform: translateY(2px);
        }

        /* ----- 视图2：转盘区域 ----- */
        #view-wheel {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        .interactive-area {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 60px;
            margin-bottom: 40px;
            width: 100%;
        }
        
        /* 转盘样式 */
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
        }
        .wheel-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            border: 4px solid #fff;
        }
        .wheel-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center;
            font-size: 14px;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            pointer-events: none;
            white-space: nowrap;
            z-index: 5;
        }
        
        /* 指针与生成按钮 */
        .pointer-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 2s cubic-bezier(0.2, 0.8, 0.1, 1);
            pointer-events: none;
            z-index: 10;
        }
        .pointer-arrow {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-bottom: 40px solid #e74c3c;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
        }
        .btn-generate {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #fff;
            border: 4px solid #3498db;
            color: #3498db;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 15;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-generate:hover {
            background: #ebf5fb;
        }
        .btn-generate:disabled {
            background: #f5f5f5;
            border-color: #ccc;
            color: #aaa;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 结果文本样式 */
        .result-area {
            font-size: 32px;
            color: #2c3e50;
            font-weight: 500;
        }
        .blank-line {
            display: inline-block;
            min-width: 120px;
            border-bottom: 3px solid #2c3e50;
            text-align: center;
            color: #e74c3c;
            font-weight: bold;
            padding: 0 10px;
            margin: 0 5px;
            line-height: 1.2;
            vertical-align: bottom;
        }

        /* 底部重置按钮 */
        .btn-reset {
            background: #95a5a6;
            color: #fff;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-reset:hover {
            background: #7f8c8d;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>建立模型</h1>

    <!-- 视图1：输入数据 -->
    <div id="view-input">
        <div class="input-wrapper">
            <textarea id="data-input" placeholder="请粘贴文本或表格数据，每行为一个词语和概率..."></textarea>
            <button class="btn-clear" onclick="clearInput()">清空</button>
        </div>
        <button class="btn-build" onclick="buildModel()">建立模型</button>
    </div>

    <!-- 视图2：转盘交互 -->
    <div id="view-wheel">
        <div class="interactive-area">
            <!-- 左侧/中间的转盘 -->
            <div class="wheel-container">
                <div id="wheel-bg" class="wheel-bg"></div>
                <div id="pointer-wrapper" class="pointer-wrapper">
                    <div class="pointer-arrow"></div>
                </div>
                <button id="btn-generate" class="btn-generate" onclick="generateResult()">生成结果</button>
            </div>
            
            <!-- 右侧的结果显示 -->
            <div class="result-area">
                雪花像<span id="result-word" class="blank-line"></span>。
            </div>
        </div>
        
        <!-- 下方重置按钮 -->
        <button class="btn-reset" onclick="resetModel()">重置</button>
    </div>
</div>

<script>
    // 默认模拟数据
    const defaultData = `梨花 0.3191
柳絮 0.2979
盐 0.0638
琼瑶 0.0638
羽毛 0.0638
琼枝 0.0426
玉花 0.0426
席 0.0213
飞花 0.0213
琼花 0.0213
玉 0.0213
银 0.0213`;

    // 页面加载时填入默认数据
    window.onload = () => {
        document.getElementById('data-input').value = defaultData;
    };

    // 全局变量保存解析后的数据和转盘状态
    let parsedData = [];
    let currentRotation = 0;
    const colors = [
        '#FF6B6B', '#4ECDC4', '#C7F464', '#FFD166', '#118AB2', 
        '#073B4C', '#8338EC', '#FF9F1C', '#2A9D8F', '#E76F51', 
        '#F4A261', '#E9C46A', '#9B5DE5', '#F15BB5'
    ];

    // 清空输入框
    function clearInput() {
        document.getElementById('data-input').value = '';
    }

    // 解析数据并建立模型
    function buildModel() {
        const text = document.getElementById('data-input').value;
        if (!text.trim()) {
            alert('请输入数据！');
            return;
        }

        // 使用正则提取所有词语和对应概率（支持无空格或多空格混排）
        const regex = /([^\d\s]+)\s*([0-9.]+)/g;
        let match;
        parsedData = [];
        let totalProb = 0;

        while ((match = regex.exec(text)) !== null) {
            let p = parseFloat(match[2]);
            if (!isNaN(p)) {
                parsedData.push({ word: match[1], prob: p });
                totalProb += p;
            }
        }

        if (parsedData.length === 0) {
            alert('未能解析出有效数据，请检查输入格式。');
            return;
        }

        // 归一化概率（确保总和为 100%）
        parsedData.forEach(item => {
            item.prob = item.prob / totalProb;
        });

        drawWheel();

        // 切换视图
        document.getElementById('view-input').style.display = 'none';
        document.getElementById('view-wheel').style.display = 'flex';
        
        // 重置状态
        document.getElementById('result-word').innerText = '';
        currentRotation = 0;
        document.getElementById('pointer-wrapper').style.transform = `rotate(0deg)`;
        document.getElementById('btn-generate').disabled = false;
    }

    // 绘制转盘背景及文字
    function drawWheel() {
        const wheelBg = document.getElementById('wheel-bg');
        wheelBg.innerHTML = ''; // 清除旧的文字标签
        let gradientStops = [];
        let currentPercent = 0;

        parsedData.forEach((item, index) => {
            let start = currentPercent;
            currentPercent += item.prob * 100;
            let end = currentPercent;
            
            let color = colors[index % colors.length];
            gradientStops.push(`${color} ${start}% ${end}%`);

            // 计算该区块的中心角度 (0度为正上方，顺时针)
            item.startAngle = (start / 100) * 360;
            item.endAngle = (end / 100) * 360;
            item.midAngle = (item.startAngle + item.endAngle) / 2;

            // 添加文字标签
            let label = document.createElement('div');
            label.className = 'wheel-label';
            label.innerText = item.word;
            
            // 将文字推向扇形的中心：先旋转到对应角度，再向外平移
            label.style.transform = `translate(-50%, -50%) rotate(${item.midAngle - 90}deg) translateX(90px)`;
            wheelBg.appendChild(label);
        });

        // 绘制 CSS 饼图
        wheelBg.style.background = `conic-gradient(${gradientStops.join(', ')})`;
    }

    // 点击生成结果按钮
    function generateResult() {
        const btn = document.getElementById('btn-generate');
        const resultWord = document.getElementById('result-word');
        
        // 锁定按钮，清空已有结果
        btn.disabled = true;
        resultWord.innerText = '';

        // 根据概率随机抽取词语
        let rand = Math.random();
        let cumulative = 0;
        let chosenItem = null;
        for (let item of parsedData) {
            cumulative += item.prob;
            if (rand <= cumulative) {
                chosenItem = item;
                break;
            }
        }
        if (!chosenItem) chosenItem = parsedData[parsedData.length - 1]; // 容错机制

        // 计算指针需要旋转的目标角度（指针初始朝上指向0度，顺时针旋转）
        let targetAngle = chosenItem.midAngle;
        
        // 增加 5 圈 (1800度) 额外旋转实现快速旋转效果
        const extraSpins = 5 * 360;
        let remainder = currentRotation % 360;
        
        // 更新当前总旋转角度
        currentRotation = currentRotation + extraSpins + (targetAngle - remainder);

        // 开始动画
        const pointer = document.getElementById('pointer-wrapper');
        pointer.style.transform = `rotate(${currentRotation}deg)`;

        // 2秒动画结束后显示结果
        setTimeout(() => {
            resultWord.innerText = chosenItem.word;
            btn.disabled = false;
        }, 2000);
    }

    // 重置回到初始页面
    function resetModel() {
        document.getElementById('view-wheel').style.display = 'none';
        document.getElementById('view-input').style.display = 'flex';
        // 消除指针过渡动画带来的瞬移感
        const pointer = document.getElementById('pointer-wrapper');
        pointer.style.transition = 'none';
        pointer.style.transform = 'rotate(0deg)';
        setTimeout(() => {
            pointer.style.transition = 'transform 2s cubic-bezier(0.2, 0.8, 0.1, 1)';
        }, 50);
    }
</script>

</body>
</html>
