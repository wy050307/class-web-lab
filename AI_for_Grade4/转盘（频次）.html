<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>建立模型</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 20px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f4f7f6; color: #333;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 850px;
            background: #ffffff; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); margin-top: 20px;
        }
        h1 { text-align: center; margin-top: 0; margin-bottom: 30px; color: #2c3e50; font-size: 28px; }

        /* ----- 输入视图 ----- */
        #view-input { display: flex; flex-direction: column; align-items: center; }
        .input-wrapper { position: relative; width: 100%; max-width: 600px; margin-bottom: 30px; }
        textarea {
            width: 100%; height: 280px; padding: 15px; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 16px; line-height: 1.6; resize: vertical;
            outline: none; transition: border-color 0.3s; font-family: monospace;
        }
        textarea:focus { border-color: #3498db; }
        .btn-clear {
            position: absolute; right: 12px; bottom: 12px;
            background: #fff; border: 1px dashed #999; color: #666;
            padding: 4px 10px; font-size: 12px; border-radius: 4px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-clear:hover { border-color: #e74c3c; color: #e74c3c; }
        .btn-build {
            background: #3498db; color: #fff; border: none;
            padding: 14px 40px; font-size: 18px; font-weight: bold;
            border-radius: 8px; cursor: pointer; transition: background 0.3s;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }
        .btn-build:hover { background: #2980b9; }

        /* ----- 转盘视图 ----- */
        #view-wheel { display: none; flex-direction: column; align-items: center; }
        .interactive-area {
            display: flex; row-gap: 30px; column-gap: 60px;
            align-items: center; justify-content: center;
            flex-wrap: wrap; margin-bottom: 40px; width: 100%;
        }
        .wheel-container { position: relative; width: 320px; height: 320px; }
        .wheel-bg {
            width: 100%; height: 100%; border-radius: 50%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15); overflow: hidden;
            position: relative; border: 4px solid #fff;
        }
        .wheel-label {
            position: absolute; top: 50%; left: 50%; transform-origin: center;
            font-size: 14px; color: #fff; font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8); pointer-events: none; z-index: 5;
        }
        .pointer-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            transition: transform 2s cubic-bezier(0.15, 0, 0.15, 1);
            pointer-events: none; z-index: 10;
        }
        .pointer-arrow {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 40px solid #e74c3c; /* 指针修改为从上往下指 */
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .btn-generate {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border-radius: 50%;
            background: #fff; border: 4px solid #3498db; color: #3498db;
            font-size: 16px; font-weight: bold; cursor: pointer; z-index: 15;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: all 0.2s;
        }
        .btn-generate:hover { background: #ebf5fb; transform: translate(-50%, -50%) scale(1.05); }
        .btn-generate:disabled { background: #f5f5f5; border-color: #ccc; color: #aaa; cursor: not-allowed; }

        .result-area { font-size: 32px; color: #2c3e50; }
        .blank-line {
            display: inline-block; min-width: 140px; border-bottom: 3px solid #2c3e50;
            text-align: center; color: #e74c3c; font-weight: bold;
            padding: 0 10px; margin: 0 5px; height: 45px; vertical-align: bottom;
        }
        .btn-reset {
            background: #95a5a6; color: #fff; border: none;
            padding: 10px 30px; font-size: 16px; border-radius: 6px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>建立模型</h1>

    <div id="view-input">
        <div class="input-wrapper">
            <!-- 模拟数据：词语+出现次数 -->
            <textarea id="data-input" placeholder="请输入：词语 出现次数（每行一组）">梨花 15
柳絮 14
盐 3
琼瑶 3
羽毛 3
琼枝 2
玉花 2
席 1
飞花 1
琼花 1
玉 1
银 1</textarea>
            <button class="btn-clear" onclick="clearInput()">清空</button>
        </div>
        <button class="btn-build" onclick="buildModel()">建立模型</button>
    </div>

    <div id="view-wheel">
        <div class="interactive-area">
            <div class="wheel-container">
                <div id="wheel-bg" class="wheel-bg"></div>
                <div id="pointer-wrapper" class="pointer-wrapper">
                    <div class="pointer-arrow"></div>
                </div>
                <button id="btn-generate" class="btn-generate" onclick="generateResult()">生成结果</button>
            </div>
            
            <div class="result-area">
                雪花像<span id="result-word" class="blank-line"></span>。
            </div>
        </div>
        <button class="btn-reset" onclick="resetModel()">重置</button>
    </div>
</div>

<script>
    let parsedData = [];
    let currentRotation = 0;
    const colors = ['#FF6B6B', '#4ECDC4', '#FFD166', '#118AB2', '#073B4C', '#8338EC', '#3498db', '#2ecc71', '#f1c40f', '#e67e22', '#e74c3c', '#9b5de5'];

    function clearInput() { document.getElementById('data-input').value = ''; }

    function buildModel() {
        const text = document.getElementById('data-input').value.trim();
        if (!text) return alert('请输入数据');

        // 解析“词语 次数”格式
        const lines = text.split('\n');
        parsedData = [];
        let totalCount = 0;

        lines.forEach(line => {
            const parts = line.trim().split(/\s+/);
            if (parts.length >= 2) {
                const word = parts[0];
                const count = parseFloat(parts[1]);
                if (!isNaN(count) && count > 0) {
                    parsedData.push({ word, count });
                    totalCount += count;
                }
            }
        });

        if (parsedData.length === 0) return alert('数据格式不正确，请确保每行：词语 出现次数');

        // 后台计算概率
        parsedData.forEach(item => {
            item.prob = item.count / totalCount;
        });

        renderWheel();
        document.getElementById('view-input').style.display = 'none';
        document.getElementById('view-wheel').style.display = 'flex';
        document.getElementById('result-word').innerText = '';
        currentRotation = 0;
        document.getElementById('pointer-wrapper').style.transform = `rotate(0deg)`;
        document.getElementById('btn-generate').disabled = false;
    }

    function renderWheel() {
        const wheelBg = document.getElementById('wheel-bg');
        wheelBg.innerHTML = '';
        let currentPercent = 0;
        let stops = [];

        parsedData.forEach((item, i) => {
            let start = currentPercent;
            currentPercent += item.prob * 100;
            let end = currentPercent;
            let color = colors[i % colors.length];
            stops.push(`${color} ${start}% ${end}%`);

            item.midAngle = ((start + end) / 2) * 3.6;

            const label = document.createElement('div');
            label.className = 'wheel-label';
            label.innerText = item.word;
            label.style.transform = `translate(-50%, -50%) rotate(${item.midAngle}deg) translateY(-100px)`;
            wheelBg.appendChild(label);
        });

        wheelBg.style.background = `conic-gradient(${stops.join(',')})`;
    }

    function generateResult() {
        const btn = document.getElementById('btn-generate');
        const res = document.getElementById('result-word');
        btn.disabled = true;
        res.innerText = '';

        // 基于概率抽取
        let rand = Math.random();
        let cum = 0;
        let selected = parsedData[parsedData.length - 1];
        for (let item of parsedData) {
            cum += item.prob;
            if (rand <= cum) { selected = item; break; }
        }

        // 计算旋转角度：转盘是静止的，指针旋转
        // 由于指针初始在 0deg (正上方)，我们需要让它停在选中扇区的中心角度 (selected.midAngle)
        const spins = 1440; // 额外转 4 圈
        const targetRotation = currentRotation + spins + (selected.midAngle - (currentRotation % 360));
        currentRotation = targetRotation;

        document.getElementById('pointer-wrapper').style.transform = `rotate(${targetRotation}deg)`;

        setTimeout(() => {
            res.innerText = selected.word;
            btn.disabled = false;
        }, 2000);
    }

    function resetModel() {
        document.getElementById('view-wheel').style.display = 'none';
        document.getElementById('view-input').style.display = 'flex';
    }
</script>

</body>
</html>
