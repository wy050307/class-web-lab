<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 灵感织网：Convex 实时版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2.1.0/dist/echarts-wordcloud.min.js"></script>
    <script src="https://unpkg.com/convex@1.11.0/dist/browser.bundle.js"></script>
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; background: #020617; color: #f8fafc; }
        .cyber-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(56, 189, 248, 0.2); }
        .word-btn { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .word-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="app" class="p-4 md:p-8 min-h-screen">
        <div v-if="role === 'guest'" class="max-w-md mx-auto mt-20">
            <div class="cyber-card p-8 rounded-3xl text-center">
                <h1 class="text-3xl font-bold mb-6 text-sky-400">实生成式AI实验室</h1>
                <input v-model="passcode" type="password" placeholder="输入密钥 (1234 或 4096)" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl mb-4 text-center">
                <button @click="verify" class="w-full bg-sky-600 p-4 rounded-xl font-bold">进入系统</button>
            </div>
        </div>

        <div v-if="role === 'student'" class="max-w-2xl mx-auto">
            <div class="flex justify-between mb-8 text-sky-500">
                <span>● 云端同步中 (Convex)</span>
                <button @click="role='guest'">退出</button>
            </div>
            <div class="cyber-card p-8 rounded-3xl text-center">
                <div class="text-4xl font-bold mb-10">雪花像 <span class="text-sky-400 border-b-2 border-sky-400">{{ currentWord || '___' }}</span></div>
                <div class="grid grid-cols-3 gap-3 mb-10">
                    <button v-for="w in wordPool" @click="currentWord = w" class="word-btn p-4 rounded-xl" :class="currentWord===w?'bg-sky-600':'bg-slate-800'">{{w}}</button>
                </div>
                <button @click="submit" :disabled="!currentWord || loading" class="w-full py-5 bg-sky-500 rounded-2xl font-bold text-xl disabled:opacity-30">
                    {{ loading ? '发射中...' : '发射语料' }}
                </button>
            </div>
        </div>

        <div v-if="role === 'teacher'" class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-sky-400">全班概率模型：毫秒级实时监控</h2>
                <div class="flex gap-4">
                    <button @click="clearAll" class="text-red-400 text-sm">重置全部数据</button>
                    <button @click="role='guest'" class="bg-slate-800 px-4 py-2 rounded-lg">退出</button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 space-y-6">
                    <div id="chart" class="cyber-card rounded-3xl h-[400px]"></div>
                    <div class="cyber-card p-6 rounded-3xl">
                        <div v-for="item in topWords" class="flex items-center gap-4 mb-4">
                            <span class="w-16 font-bold">{{item.name}}</span>
                            <div class="flex-1 h-3 bg-slate-800 rounded-full overflow-hidden">
                                <div class="h-full bg-sky-500 transition-all duration-500" :style="{width: item.percent+'%'}"></div>
                            </div>
                            <span class="text-sky-400 font-mono">{{item.percent}}%</span>
                        </div>
                    </div>
                </div>
                <div class="cyber-card p-6 rounded-3xl overflow-y-auto h-[600px]">
                    <h3 class="mb-4 text-slate-500 italic">最新灵感流...</h3>
                    <div v-for="log in dataLogs" :key="log._id" class="mb-3 p-3 bg-slate-800/40 rounded-xl border-l-4 border-sky-500">
                        <div class="flex justify-between text-xs text-slate-500 mb-1">
                            <span>UID: {{log._id.slice(-4)}}</span>
                            <span>{{log.time}}</span>
                        </div>
                        <div class="font-bold text-lg">雪花像 {{log.word}}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 请替换为你自己的 Convex URL
        const CONVEX_URL = "https://sensible-sockeye-877.convex.cloud";
        const client = new Convex.ConvexClient(CONVEX_URL);

        const { createApp, ref, computed, onUnmounted } = Vue;
        createApp({
            setup() {
                const role = ref('guest');
                const passcode = ref('');
                const currentWord = ref('');
                const loading = ref(false);
                const dataLogs = ref([]);
                const wordPool = ['羽毛', '棉絮', '纸片', '精灵', '花瓣', '梨花', '白砂糖', '降落伞', '盐粒', '鹅毛'];
                let chart = null;
                let unsubscribe = null;

                const verify = () => {
                    if (passcode.value === '1234') role.value = 'student';
                    if (passcode.value === '4096') {
                        role.value = 'teacher';
                        startRealtimeSync();
                    }
                };

                // Convex 的实时订阅：关键所在！
                const startRealtimeSync = () => {
                    // 只要数据库有变化，这个回调会自动执行，不需要定时器
                    unsubscribe = client.onQuery("words:get", {}, (data) => {
                        dataLogs.value = data;
                        renderChart();
                    });
                };

                const submit = async () => {
                    loading.value = true;
                    try {
                        await client.mutation("words:send", { 
                            word: currentWord.value, 
                            time: new Date().toLocaleTimeString() 
                        });
                        currentWord.value = '';
                        alert('已送达云端！');
                    } finally { loading.value = false; }
                };

                const topWords = computed(() => {
                    if (!dataLogs.value.length) return [];
                    const counts = {};
                    dataLogs.value.forEach(d => counts[d.word] = (counts[d.word] || 0) + 1);
                    return Object.entries(counts).map(([name, c]) => ({
                        name, percent: (c / dataLogs.value.length * 100).toFixed(1)
                    })).sort((a,b) => b.percent - a.percent);
                });

                const renderChart = () => {
                    const dom = document.getElementById('chart');
                    if (!dom) return;
                    if (!chart) chart = echarts.init(dom);
                    const counts = {};
                    dataLogs.value.forEach(d => counts[d.word] = (counts[d.word] || 0) + 1);
                    chart.setOption({
                        series: [{
                            type: 'wordCloud',
                            sizeRange: [20, 70],
                            textStyle: { color: () => `rgb(${Math.random()*100+155}, 200, 255)` },
                            data: Object.entries(counts).map(([name, value]) => ({ name, value }))
                        }]
                    });
                };

                const clearAll = async () => {
                    if (confirm('确定清空所有平板的数据吗？')) {
                        await client.mutation("words:clear");
                    }
                };

                onUnmounted(() => { if(unsubscribe) unsubscribe(); });

                return { role, passcode, verify, wordPool, currentWord, submit, dataLogs, topWords, clearAll, loading };
            }
        }).mount('#app');
    </script>
</body>
</html>
